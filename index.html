<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Strike</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050510; color: white; font-family: 'Press Start 2P', cursive; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #stats { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 20; text-shadow: 0 0 10px #0ff; font-size: 9px; pointer-events: none; }
        #boss-ui { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 75%; display: none; z-index: 25; text-align: center; }
        #boss-bar-bg { width: 100%; height: 12px; background: #300; border: 2px solid #f33; margin-top: 5px; box-shadow: 0 0 10px #f00; }
        #boss-bar-fill { width: 100%; height: 100%; background: #f00; }
        .menu-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 20, 0.95); padding: 35px; border: 3px solid #0ff; text-align: center; z-index: 30; width: 280px; }
        button { background: #000; color: #0ff; border: 2px solid #0ff; padding: 15px; font-family: 'Press Start 2P', cursive; cursor: pointer; width: 100%; }
        #pauseBtn{
    pointer-events:auto;
    border:2px solid #0ff;
    padding:6px 10px;
    border-radius:6px;
    box-shadow:0 0 10px #0ff;
    cursor:pointer;
}
    </style>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00ffff">
<meta name="background-color" content="#05080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js", { scope: "./" });
}
</script>
<body>

    <div id="stats">
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div>BOMBS: <span id="bombVal">1</span></div>
        <div>HP: <span id="livesVal">3</span></div>
        <div id="pwr-label" style="color: #ff0; display: none;">WARP!</div>
        <div id="pauseBtn">⏸</div>
    </div>

    <div id="boss-ui">
        <div style="font-size: 8px; color: #f33; margin-bottom: 5px;">BOSS INTEGRITY</div>
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>

    <div id="ui-layer">
        <div id="start-menu" class="menu-card">
            <h1 style="color:#0ff; font-size: 22px;">NEON<br>STRIKE</h1>
            <button onclick="startGame()">INITIATE</button>
        </div>
        <div id="game-over" class="menu-card" style="display: none;">
            <h2 style="color:#f33;">WIPED OUT</h2>
            <button onclick="startGame()">REBOOT</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
if ("serviceWorker" in navigator && "Notification" in window) {
  Notification.requestPermission().then(p => {
    if (p === "granted") {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification("⚡ Neon Strike", {
          body: "System Online. Initiate combat.",
          icon: "icon-192.png",
          badge: "icon-192.png",
          vibrate: [80, 40, 80],
          tag: "neon-alert"
        });
      });
    }
  });
}
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(freq, type, duration, vol=0.07) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score, lives, bombs, gameActive = false, isTouching = false;
let player, bullets, bossBullets, enemies, healthPacks, powerUps, stars, particles, boss = null;
let lastSpawn, lastHealthSpawn, lastPowerSpawn, lastShot, lastTap = 0;
let powerTimer = 0, slowTimer = 0, shieldActive = false, bombFlash = 0, shakeTime = 0, warpTime = 0;
let paused = false;
let pauseTime = 0;
function vibrate(ms=30){
    if(navigator.vibrate) navigator.vibrate(ms);
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 3 + 1;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.alpha = 1;
    }
    update(ts) { this.x += this.vx * ts; this.y += this.vy * ts; this.alpha -= 0.02 * ts; }
    draw() {
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
    }
}

function createExplosion(x, y, color, count = 12) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

function triggerBomb() {
vibrate([50,30,50]);
    if (bombs <= 0 || !gameActive) return;
    bombs--; bombFlash = 12; shakeTime = 30;
    playSound(40, 'sawtooth', 0.8, 0.2);
    enemies.forEach(e => { score++; createExplosion(e.x + e.size/2, e.y + e.size/2, '#f33', 20); });
    enemies = []; bossBullets = [];
    if (boss) {
        boss.hp -= 15; boss.hitTimer = 15;
        createExplosion(boss.x + boss.w/2, boss.y + boss.h/2, '#fff', 30);
        if (boss.hp <= 0) destroyBoss();
    }
}

function destroyBoss() {
    score += 15; if (bombs < 2) bombs++;
    createExplosion(boss.x+boss.w/2, boss.y+boss.h/2, '#f33', 60);
    boss = null; document.getElementById('boss-ui').style.display = 'none';
    playSound(40, 'sawtooth', 1.2);
    vibrate(60);
}

function startGame() {
    initAudio();
    score = 0; lives = 3; bombs = 1; bullets = []; bossBullets = []; enemies = []; healthPacks = []; powerUps = []; particles = []; boss = null;
    lastSpawn = 0; lastHealthSpawn = Date.now(); lastPowerSpawn = Date.now(); lastShot = 0;
    powerTimer = 0; slowTimer = 0; shieldActive = false; warpTime = 60;
    player = { x: canvas.width / 2, y: canvas.height - 120 };
    gameActive = true;
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    document.getElementById('boss-ui').style.display = 'none';
    stars = Array.from({length: 40}, () => ({ 
        x: Math.random() * canvas.width, y: Math.random() * canvas.height, 
        s: Math.random() * 3 + 1, color: ['#0ff', '#f0f', '#ff0'][Math.floor(Math.random() * 3)]
    }));
    update();
}

canvas.addEventListener('touchstart', (e) => {
    let now = Date.now();
    if (now - lastTap < 300) triggerBomb();
    lastTap = now; isTouching = true; movePlayer(e);
});
canvas.addEventListener('touchmove', (e) => movePlayer(e));
canvas.addEventListener('touchend', () => isTouching = false);
function movePlayer(e) { if(gameActive) player.x = e.touches[0].clientX; }

function update() {
if(paused){
    ctx.fillStyle="rgba(0,0,0,0.45)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#0ff";
    ctx.textAlign="center";
    ctx.font="16px 'Press Start 2P'";
    ctx.fillText("PAUSED", canvas.width/2, canvas.height/2);

    requestAnimationFrame(update);
    return;
}
    if (!gameActive) return;
    const now = Date.now();
    const ts = (slowTimer > now) ? 0.4 : 1.0;
    const level = Math.floor(score / 10);

    let ox = (shakeTime > 0) ? (Math.random()-0.5)*15 : 0;
    let oy = (shakeTime > 0) ? (Math.random()-0.5)*15 : 0;
    if (shakeTime > 0) shakeTime--;
    if (warpTime > 0) warpTime--;

    if (!paused && isTouching && now - lastShot > 350) {
        if (powerTimer > now) bullets.push({x: player.x, y: player.y, vx: -3.5}, {x: player.x, y: player.y, vx: 0}, {x: player.x, y: player.y, vx: 3.5});
        else bullets.push({x: player.x, y: player.y, vx: 0});
        playSound(400, 'triangle', 0.1); lastShot = now;
    }

    if (score > 0 && score % 50 === 0 && !boss) {
        boss = { x: canvas.width/2-90, y: -100, w: 180, h: 70, hp: 60, maxHp: 60, dir: 1, hitTimer: 0, lastFire: 0 };
        document.getElementById('boss-ui').style.display = 'block';
    }

    if (!boss && now - lastSpawn > Math.max(350, 1100 - (level * 45))) {
        enemies.push({ x: Math.random()*(canvas.width-45), y: -55, size: 50, speed: 3.5+(level*0.25), hp: 2 });
        lastSpawn = now;
    }

    if (now-lastPowerSpawn > 15000) { 
        let type = ['tri', 'shield', 'slow'][Math.floor(Math.random()*3)];
        powerUps.push({x: Math.random()*(canvas.width-30), y: -30, type: type}); 
        lastPowerSpawn = now; 
    }
    if (now-lastHealthSpawn > 25000) { healthPacks.push({x: Math.random()*(canvas.width-30), y: -30}); lastHealthSpawn = now; }

    ctx.setTransform(1, 0, 0, 1, ox, oy);
    ctx.fillStyle = '#020205'; ctx.fillRect(-50, -50, canvas.width+100, canvas.height+100);
    
    stars.forEach(s => { 
        let speed = warpTime > 0 ? s.s * 15 : s.s * ts;
        s.y += speed; 
        if(s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; } 
        ctx.fillStyle = s.color; ctx.globalAlpha = 0.4;
        if (warpTime > 0) ctx.fillRect(s.x, s.y, 1, 40); else ctx.fillRect(s.x, s.y, 2, 2);
        ctx.globalAlpha = 1.0;
    });

    particles.forEach((p, i) => { p.update(ts); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); });

    if (boss) {
        boss.y += (boss.y < 80 ? 1.5 : 0.1) * ts;
        boss.x += boss.dir * (2.2 + level*0.2) * ts;
        if (boss.x <= 10 || boss.x + boss.w >= canvas.width - 10) boss.dir *= -1;
        if (now - boss.lastFire > (slowTimer > now ? 4000 : 2000)) {
            bossBullets.push({x: boss.x+boss.w/2, y: boss.y+boss.h, vx: -2.5}, {x: boss.x+boss.w/2, y: boss.y+boss.h, vx: -0.8}, {x: boss.x+boss.w/2, y: boss.y+boss.h, vx: 0.8}, {x: boss.x+boss.w/2, y: boss.y+boss.h, vx: 2.5});
            playSound(100, 'square', 0.2); boss.lastFire = now;
        }
        ctx.save();
        ctx.shadowBlur = 30; ctx.shadowColor = '#f33';
        ctx.fillStyle = boss.hitTimer > 0 ? '#fff' : '#f33'; if(boss.hitTimer > 0) boss.hitTimer--;
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h); ctx.restore();
        // Update Health Bar UI
        document.getElementById('boss-bar-fill').style.width = (Math.max(0, boss.hp) / boss.maxHp * 100) + '%';
    }

    ctx.save();
    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(player.x-22, player.y+38); ctx.lineTo(player.x+22, player.y+38); ctx.fill();
    if (shieldActive) { ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(player.x, player.y+18, 45, 0, Math.PI*2); ctx.stroke(); }
    ctx.restore();

    bossBullets.forEach((bb, i) => {
        bb.y += 6 * ts; bb.x += bb.vx * ts;
        ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#f00';
        ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(bb.x, bb.y, 8, 0, Math.PI*2); ctx.fill(); ctx.restore();
        if (Math.hypot(bb.x - player.x, bb.y - (player.y+18)) < 30) { bossBullets.splice(i, 1); handleDamage(); }
    });

    bullets.forEach((b, i) => {
        b.y -= 12 * ts; b.x += b.vx * ts;
        ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#ff0';
        ctx.fillStyle = '#ff0'; ctx.fillRect(b.x-2, b.y, 5, 15); ctx.restore();
        if (boss && b.x > boss.x && b.x < boss.x + boss.w && b.y < boss.y + boss.h && b.y > boss.y) {
            boss.hp -= 1; boss.hitTimer = 3; bullets.splice(i, 1); 
            if (boss.hp <= 0) destroyBoss();
        }
    });

    enemies.forEach((e, i) => {
        e.y += e.speed * ts;
        ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#f33';
        ctx.fillStyle = e.hp > 1 ? '#f33' : '#a00'; ctx.fillRect(e.x, e.y, e.size, e.size); ctx.restore();
        bullets.forEach((b, bi) => {
            if (b.x > e.x && b.x < e.x + e.size && b.y < e.y + e.size && b.y > e.y) {
                e.hp--; bullets.splice(bi, 1); if (e.hp <= 0) { score++; createExplosion(e.x+e.size/2, e.y+e.size/2, '#f33', 15); enemies.splice(i, 1); playSound(80, 'square', 0.1); }
            }
        });
        if (Math.hypot(e.x+e.size/2 - player.x, e.y+e.size/2 - (player.y+18)) < 38) { handleDamage(); enemies.splice(i, 1); }
    });

    healthPacks.forEach((h, i) => { 
        h.y+=3*ts; ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = '#0f0';
        ctx.fillStyle='#0f0'; ctx.fillRect(h.x,h.y,25,25); ctx.restore();
        if(Math.hypot(h.x+12-player.x,h.y+12-(player.y+18))<38){ if(lives<4) lives++; healthPacks.splice(i,1); playSound(950,'sine',0.2); } 
    });
    powerUps.forEach((p, i) => { 
        p.y+=3*ts; let col = p.type==='tri'?'#f0f':p.type==='shield'?'#0ff':'#ff0';
        ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = col;
        ctx.fillStyle=col; ctx.beginPath(); ctx.arc(p.x+15,p.y+15,12,0,Math.PI*2); ctx.fill(); ctx.restore();
        if(Math.hypot(p.x+15-player.x,p.y+15-(player.y+18))<38){ if(p.type==='tri') powerTimer=now+8000; else if(p.type==='shield') shieldActive=true; else slowTimer=now+5000; powerUps.splice(i,1); playSound(1200,'sine',0.4); } 
    });

    if (bombFlash > 0) { ctx.fillStyle = `rgba(255,255,255,${bombFlash/12})`; ctx.fillRect(0,0,canvas.width,canvas.height); bombFlash--; }

    function handleDamage() {
    vibrate(60);
        shakeTime = 15;
        if (shieldActive) { shieldActive = false; playSound(300, 'sine', 0.4); }
        else { lives--; playSound(100, 'square', 0.6); if (lives <= 0) endGame(); }
    }

    function endGame() { gameActive = false; document.getElementById('game-over').style.display = 'block'; }

    document.getElementById('scoreVal').innerText = score;
    document.getElementById('livesVal').innerText = lives;
    document.getElementById('bombVal').innerText = bombs;
    document.getElementById('pwr-label').style.display = (warpTime > 0) ? 'block' : 'none';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    requestAnimationFrame(update);
}

const pauseBtn = document.getElementById("pauseBtn");

pauseBtn.onclick = () => {
    if(!gameActive) return;

    paused = !paused;
    vibrate(30);

    pauseBtn.textContent = paused ? "▶" : "⏸";

};
</script>
</body>
</html>
